{{ define "content" }}
<!-- Include Quill stylesheet -->
<link
    href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
    rel="stylesheet"
/>

<h2>New Paste</h2>
<form id="paste-form" action="/save" method="POST">
    <!-- Create the editor container -->
    <div id="editor" style="height: 500px"></div>
    <input type="hidden" name="content" id="content-input" />
    <br />
    <button type="submit">Save</button>
</form>

<!-- Include the Quill library -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<!-- Include Magic URL module -->
<script src="https://cdn.jsdelivr.net/npm/quill-magic-url@4.2.0/dist/index.min.js"></script>

<!-- Initialize Quill editor -->
<script>
    let magicUrlEnabled = false;
    try {
        // Version 4.x often uses QuillMagicUrl, Version 3.x uses MagicUrl
        const module =
            typeof QuillMagicUrl !== "undefined"
                ? QuillMagicUrl
                : typeof MagicUrl !== "undefined"
                  ? MagicUrl
                  : null;

        if (module) {
            Quill.register("modules/magicUrl", module);
            magicUrlEnabled = true;
        } else {
            console.warn(
                "MagicUrl module not found, auto-linking will be disabled.",
            );
        }
    } catch (e) {
        console.error("Error registering MagicUrl:", e);
    }

    const quill = new Quill("#editor", {
        theme: "snow",
        placeholder: "Enter your text here...",
        modules: {
            ...(magicUrlEnabled ? { magicUrl: true } : {}),
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ["bold", "italic", "underline", "strike"],
                ["blockquote", "code-block", "image"],
                [{ list: "ordered" }, { list: "bullet" }],
                ["link", "clean"],
            ],
        },
    });

    const form = document.querySelector("#paste-form");
    form.onsubmit = function () {
        const content = document.querySelector("#content-input");
        content.value = quill.root.innerHTML;

        if (quill.getText().trim() === "" && !quill.root.querySelector("img")) {
            alert("Please enter some content or an image before saving.");
            return false;
        }
    };
</script>
{{ end }}
